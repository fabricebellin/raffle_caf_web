<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tirage au sort CAF</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="audio-tambour" src="Drum Roll Roulement de Tambour Free Sound Effects.mp3" preload="auto"></audio>

  <div id="ticket-container" class="ticket-overlay hidden">
    <div class="ticket">
      <div class="ticket-header">CAF TARN-ET-GARONNE</div>
      <div class="winner-zone">
        <span id="left-stick" class="drumstick left hidden">🥢</span>
        <div id="ticket-winner">🥁</div>
        <span id="right-stick" class="drumstick right hidden">🥢</span>
      </div>
      <div id="ticket-title">SÉLECTION EN COURS...</div>
      <div class="ticket-footer">🎫 TICKET GAGNANT 🎫</div>
    </div>
  </div>

  <header class="header">
    <img src="logo_caf-removebg-preview.png" alt="Logo CAF" class="logo-caf">
    <h1>Tirage au sort — CAF de Tarn-et-Garonne</h1>
    <button onclick="toggleFullScreen()" class="fullscreen-btn">Plein écran</button>
  </header>

  <main class="container">
    <div class="controls">
      <label>Nombre total de participants :</label>
      <input type="number" id="total-participants" min="1" value="1">
      <label>Nombre de Clio :</label>
      <input type="number" id="cars" min="1" value="1">
      <button onclick="draw()">Tirer au sort</button>
    </div>

    <div style="margin-top:20px; text-align:center;">
        <button onclick="toggleListe()">Masquer/Afficher la liste</button>
    </div>

    <textarea id="input" placeholder="La liste apparaîtra ici..."></textarea>
    <pre id="result"></pre>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
